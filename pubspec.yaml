name: fintrack_app
description: "FinTrack Pro — premium offline expense tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.2.7

  # Internationalization & formatting
  intl: any

  # Native platform integrations
  local_auth: ^2.3.0
  camera: ^0.11.0+2
  image: ^4.2.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  workmanager: ^0.9.0+3
  dynamic_color: ^1.7.0
  home_widget: ^0.6.0
  flutter_native_splash: ^2.4.1
  file_picker: ^8.1.2

  # Utilities
  uuid: ^4.4.2
  archive: ^3.6.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/app_logo.png"
  adaptive_icon_monochrome: "assets/logo/app_logo.png"
